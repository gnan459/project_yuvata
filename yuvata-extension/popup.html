<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yuvata Analyzer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
    }

    .container {
      padding: 20px;
    }

    .header {
      background: white;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .header h1 {
      font-size: 20px;
      color: #667eea;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header p {
      font-size: 12px;
      color: #666;
      line-height: 1.4;
    }

    .button-group {
      display: flex;
      gap: 10px;
      flex-direction: column;
    }

    .btn {
      padding: 14px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(102, 126, 234, 0.6);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: white;
      color: #667eea;
      border: 2px solid #667eea;
    }

    .btn-secondary:hover {
      background: #f0f4ff;
    }

    .status {
      background: white;
      padding: 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 12px;
      line-height: 1.5;
      display: none;
    }

    .status.show {
      display: block;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
      border-left: 4px solid #28a745;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
      border-left: 4px solid #f5c6cb;
    }

    .status.info {
      background: #d1ecf1;
      color: #0c5460;
      border-left: 4px solid #bee5eb;
    }

    .stats {
      background: white;
      padding: 12px;
      border-radius: 8px;
      font-size: 11px;
      color: #666;
      line-height: 1.6;
      display: none;
    }

    .stats.show {
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .info-box {
      background: rgba(255,255,255,0.1);
      color: white;
      padding: 12px;
      border-radius: 8px;
      font-size: 11px;
      line-height: 1.5;
      margin-top: 12px;
    }

    .info-box strong {
      display: block;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>🛡️ Yuvata Analyzer</h1>
      <p>Detect misinformation on Instagram in real-time</p>
    </div>

    <!-- Status Message -->
    <div class="status" id="status"></div>

    <!-- Analyze Buttons -->
    <div class="button-group">
      <button class="btn btn-primary" id="analyzeBtn">
        <span>🔍 Analyze Posts</span>
      </button>
      <button class="btn btn-secondary" id="clearBtn">
        🗑️ Clear Cache
      </button>
    </div>

    <!-- Stats -->
    <div class="stats" id="stats">
      <strong id="statsTitle"></strong>
      <div id="statsContent"></div>
    </div>

    <!-- Info Box -->
    <div class="info-box">
      <strong>💡 Tips:</strong>
      • Click "Analyze Posts" to scan the page<br>
      • Badges will appear on posts<br>
      • ⚠️ alerts show risky content<br>
      • Check DevTools Console (F12) for logs
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
